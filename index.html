<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMINISTRADOR | CONECTA EM: SISTEMA_AP_001</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { ap: { primary: '#165DFF', dark: '#0A0E27', gray: '#1A1F38', orange: '#FF7D00', green: '#2ECC71', red: '#e74c3c', yellow: '#FACC15' } } } } }
    </script>
    <style>
        .mensagem-adm, .mensagem-cliente { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gradient-to-br from-ap-dark to-black text-white min-h-screen p-4">
    <div id="telaCadastro" class="fixed inset-0 bg-black/90 z-50 flex items-center justify-center">
        <div class="bg-ap-gray p-8 rounded-xl border-2 border-ap-red/50 shadow-2xl text-center">
            <h2 class="text-2xl font-bold text-ap-red mb-4">🛡️ PERFIL DO ADM</h2>
            <p class="text-gray-300 mb-4">Seu nome:</p>
            <input type="text" id="nomeAdm" class="w-full bg-black/60 border border-ap-red/30 rounded px-4 py-3 mb-4 text-center" value="ADM_Mestre">
            <button onclick="salvarNomeAdm()" class="w-full bg-ap-red py-3 rounded-lg font-bold">💾 ENTRAR NO SISTEMA</button>
        </div>
    </div>

    <div class="bg-ap-red text-white font-bold text-center py-3 mb-6 rounded-lg shadow-lg">
        🛡️ PAINEL DO ADM | ALVO: SISTEMA_AP_001  
        STATUS: <span id="statusConexao" class="text-ap-red">BUSCANDO...</span>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-1 space-y-6">
            <div class="bg-ap-gray rounded-xl border border-ap-primary/20 p-4 shadow-xl">
                <h2 class="text-xl font-bold text-ap-orange mb-4">👤 CLIENTES ONLINE <span id="qtdClientes" class="text-ap-yellow">(0)</span></h2>
                <div id="listaTodosUsuarios" class="text-sm space-y-2 max-h-[300px] overflow-y-auto text-gray-400">
                    📡 Aguardando dados...
                </div>
            </div>

            <div class="bg-ap-gray rounded-xl border border-ap-primary/20 p-4 shadow-xl">
                <h2 class="text-xl font-bold text-ap-yellow mb-4">📸 PAGAMENTOS</h2>
                <div id="solicitacoesPagamento" class="space-y-3 text-sm max-h-[300px] overflow-y-auto">Nenhuma solicitação</div>
            </div>

            <div class="bg-ap-gray rounded-xl border border-ap-primary/20 p-4 shadow-xl">
                <h2 class="text-lg font-bold mb-3">🔐 ENVIAR CÓDIGO</h2>
                <select id="seletorClienteCodigo" class="w-full bg-black/60 border border-ap-primary/30 rounded px-3 py-2 mb-3">
                    <option value="">Selecione Cliente</option>
                </select>
                <input type="text" id="codigoSala" placeholder="Código" class="w-full bg-black/60 border border-ap-primary/30 rounded px-3 py-2 mb-2">
                <input type="text" id="senhaSala" placeholder="Senha" class="w-full bg-black/60 border border-ap-primary/30 rounded px-3 py-2 mb-3">
                <button onclick="enviarCodigo()" class="w-full bg-ap-green px-4 py-2 rounded font-bold">📤 ENVIAR</button>
            </div>
        </div>

        <div class="lg:col-span-2 bg-ap-gray rounded-xl border border-ap-primary/20 overflow-hidden shadow-xl">
            <div class="p-3 border-b border-gray-700 font-semibold">💬 CONVERSA | <span id="nomeClienteAtual">Selecione um cliente</span></div>
            <div id="chatAdm" class="p-4 h-[450px] overflow-y-auto space-y-3 bg-[url('https://www.transparenttextures.com/patterns/dark-mosaic.png')] text-gray-400 text-center">
                Histórico aparecerá aqui...
            </div>
            <div class="p-3 border-t border-gray-700 flex gap-2 bg-black/40">
                <input type="text" id="mensagemAdmInput" placeholder="Digite..." class="flex-1 bg-black/70 border border-ap-primary/40 rounded-lg px-4 py-3">
                <button id="btnEnviarMsgAdm" class="bg-gradient-to-r from-ap-primary to-ap-orange px-4 py-3 rounded-lg font-bold"><i class="fa fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script>
        const ID_ALVO = "SISTEMA_AP_001";
        let conn;
        let clienteAtualId = null;
        let meuNome = "";
        let meuId = Math.random().toString(36).substr(2, 10);
        
        // DADOS QUE VEM DO HOST
        let listaUsuarios = [];
        let historicoGeral = [];
        
        const chatAdm = document.getElementById('chatAdm');

        function salvarNomeAdm() {
            meuNome = document.getElementById('nomeAdm').value.trim() || "ADM";
            document.getElementById('telaCadastro').remove();
            conectar();
        }

        function conectar() {
            const peer = new Peer({host:'0.peerjs.com',port:443,path:'/',secure:true});
            peer.on('open', () => {
                conn = peer.connect(ID_ALVO, {reliable:true,host:'0.peerjs.com',port:443,path:'/',secure:true});
                
                conn.on('open', () => {
                    document.getElementById('statusConexao').className = 'text-ap-green';
                    document.getElementById('statusConexao').textContent = "CONECTADO ✅";
                    // AVISA O HOST QUE EU SOU ADM
                    conn.send({tipo:"cadastrar_usuario",idUnico:meuId,nomeEscolhido:meuNome,cargo:"adm",tipoUsuario:"adm"});
                });

                // ✅ AQUI É O CORAÇÃO DO PROBLEMA: RECEBE OS DADOS ATUALIZADOS DO HOST
                conn.on('data', (dados) => {
                    if(dados.tipo === "dados_atualizados") {
                        listaUsuarios = dados.listaUsuarios; // LISTA DE CLIENTES CHEGOU!
                        historicoGeral = dados.historico;
                        atualizarTelaToda(); // ATUALIZA TUDO NA TELA
                    }
                    if(dados.tipo === "mensagem") {
                        if(clienteAtualId) adicionarMensagemClienteNaTela(dados.texto);
                    }
                    if(dados.tipo === "pagamento_aprovado") adicionarMensagemSistema("✅ Pagamento Aprovado!");
                    if(dados.tipo === "pagamento_recusado") adicionarMensagemSistema("❌ Pagamento Recusado!");
                    if(dados.tipo === "receber_codigo") adicionarMensagemSistema(`🔐 Código: ${dados.codigo} | Senha: ${dados.senha}`);
                });

                conn.on('close', () => {
                    document.getElementById('statusConexao').textContent = "DESCONECTADO ❌";
                    setTimeout(conectar, 2500);
                });
            });
            peer.on('error', () => setTimeout(conectar,2500));
        }

        // ✅ ATUALIZA LISTA DE CLIENTES E TUDO
        function atualizarTelaToda() {
            atualizarListaClientes();
            atualizarSolicitacoes();
            atualizarSeletorCodigo();
            carregarHistoricoNoChat();
        }

        function atualizarListaClientes() {
            const el = document.getElementById('listaTodosUsuarios');
            el.innerHTML = "";
            const clientes = listaUsuarios.filter(u => u.tipo === "cliente");
            document.getElementById('qtdClientes').textContent = `(${clientes.length})`;

            if(clientes.length === 0) { el.innerHTML = "Nenhum cliente conectado"; return; }
            
            clientes.forEach(u => {
                let status = '';
                if(u.statusPagamento === "pendente") status = '<span class="text-gray-400">Aguardando</span>';
                if(u.statusPagamento === "aguardando_print") status = '<span class="text-ap-yellow">📸 Enviar Print</span>';
                if(u.statusPagamento === "analise") status = '<span class="text-ap-orange">🔍 Em Análise</span>';
                if(u.statusPagamento === "pago") status = '<span class="text-ap-green">✅ PAGO</span>';
                if(u.statusPagamento === "recusado") status = '<span class="text-ap-red">❌ RECUSADO</span>';

                el.innerHTML += `<div onclick="selecionarCliente('${u.id}')" class="p-2 bg-black/40 rounded border-l-2 border-ap-primary cursor-pointer hover:bg-black/60">
                    <b>${u.nome}</b><br>
                    <span class="text-xs">${u.modoJogo||'-'} | R$${u.valorAposta||'0'}</span><br>
                    ${status}
                </div>`;
            });
        }

        function atualizarSolicitacoes() {
            const el = document.getElementById('solicitacoesPagamento');
            el.innerHTML = "";
            const prints = historicoGeral.filter(m => m.tipo === "print");
            if(prints.length === 0) { el.innerHTML = "Nenhuma solicitação"; return; }
            prints.forEach(p => {
                el.innerHTML += `<div class="p-2 bg-black/40 rounded border border-ap-orange/30">
                    <b>${p.remetente}</b><br>
                    <img src="${p.imagem}" class="max-w-full h-auto rounded my-1"><br>
                    <button onclick="aprovar('${p.remetente}')" class="bg-ap-green px-2 py-1 rounded text-xs">✅ APROVAR</button>
                    <button onclick="rejeitar('${p.remetente}')" class="bg-ap-red px-2 py-1 rounded text-xs">❌ REJEITAR</button>
                </div>`;
            });
        }

        function atualizarSeletorCodigo() {
            const sel = document.getElementById('seletorClienteCodigo');
            sel.innerHTML = '<option value="">Selecione Cliente</option>';
            listaUsuarios.filter(u => u.tipo === "cliente" && u.statusPagamento === "pago").forEach(u => {
                sel.innerHTML += `<option value="${u.id}">${u.nome}</option>`;
            });
        }

        function selecionarCliente(id) {
            clienteAtualId = id;
            const user = listaUsuarios.find(u => u.id === id);
            document.getElementById('nomeClienteAtual').textContent = user?.nome || "Cliente";
            carregarHistoricoNoChat();
        }

        function aprovar(nome) {
            const user = listaUsuarios.find(u => u.nome === nome);
            if(user) conn.send({tipo:"adm_aprovar_pagamento",idUsuario:user.id});
        }
        function rejeitar(nome) {
            const user = listaUsuarios.find(u => u.nome === nome);
            if(user) conn.send({tipo:"adm_rejeitar_pagamento",idUsuario:user.id});
        }
        function enviarCodigo() {
            const id = document.getElementById('seletorClienteCodigo').value;
            const cod = document.getElementById('codigoSala').value;
            const sen = document.getElementById('senhaSala').value;
            if(!id || !cod || !sen) return;
            conn.send({tipo:"enviar_codigo",idUsuario:id,codigo:cod,senha:sen});
        }

        // CARREGA HISTÓRICO
        function carregarHistoricoNoChat() {
            chatAdm.innerHTML = "";
            if(!clienteAtualId) return;
            const nomeCliente = listaUsuarios.find(u=>u.id===clienteAtualId)?.nome;
            const conversas = historicoGeral.filter(m => m.remetente === nomeCliente || m.remetente === "ADM");
            
            conversas.forEach(m => {
                if(m.tipo === "texto") {
                    if(m.remetente === "ADM") adicionarMensagemAdmNaTela(m.conteudo);
                    else adicionarMensagemClienteNaTela(m.conteudo);
                }
                if(m.tipo === "print") chatAdm.innerHTML += `<div class="border-l-2 border-green-500 pl-2 py-1">📸 Print enviado<br><img src="${m.imagem}" class="max-w-[150px]"></div>`;
            });
        }

        function adicionarMensagemAdmNaTela(texto) {
            chatAdm.innerHTML += `<div class="mensagem-adm flex gap-2 justify-end">
                <div class="bg-gradient-to-r from-ap-red to-ap-primary rounded-lg p-3 rounded-tr-none max-w-[85%] text-right"><b>Você</b><br>${texto}</div>
                <div class="w-9 h-9 rounded-xl bg-red-700 flex items-center justify-center mt-1"><i class="fa fa-shield"></i></div>
            </div>`;
            chatAdm.scrollTop = chatAdm.scrollHeight;
        }
        function adicionarMensagemClienteNaTela(texto) {
            chatAdm.innerHTML += `<div class="mensagem-cliente flex gap-2">
                <div class="w-9 h-9 rounded-xl bg-gray-700 flex items-center justify-center mt-1"><i class="fa fa-user"></i></div>
                <div class="bg-black/60 rounded-lg p-3 rounded-tl-none max-w-[85%] border-l-2 border-ap-primary"><b>Cliente</b><br>${texto}</div>
            </div>`;
            chatAdm.scrollTop = chatAdm.scrollHeight;
        }
        function adicionarMensagemSistema(texto) {
            chatAdm.innerHTML += `<div class="text-center text-ap-yellow text-sm py-1">⚡ ${texto}</div>`;
            chatAdm.scrollTop = chatAdm.scrollHeight;
        }

        // ENVIAR MENSAGEM
        document.getElementById('btnEnviarMsgAdm').addEventListener('click', () => {
            if(!clienteAtualId) return alert("Selecione um cliente!");
            const txt = document.getElementById('mensagemAdmInput').value.trim();
            if(!txt) return;
            conn.send({tipo:"adm_mensagem_cliente",idRemetente:meuId,idDestinatario:clienteAtualId,texto:txt});
            adicionarMensagemAdmNaTela(txt);
            document.getElementById('mensagemAdmInput').value = "";
        });
    </script>
</body>
</html>
