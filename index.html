<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMINISTRADOR | SISTEMA_AP_001</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { ap: { primary: '#165DFF', dark: '#0A0E27', gray: '#1A1F38', orange: '#FF7D00', green: '#2ECC71', red: '#e74c3c', yellow: '#FACC15' } } } } }
    </script>
    <style>.selecionado{border:2px solid #165DFF !important; background:#1A1F38 !important;}</style>
</head>
<body class="bg-gradient-to-br from-ap-dark to-black text-white min-h-screen p-4">
    <div id="telaNome" class="fixed inset-0 bg-black/90 z-50 flex items-center justify-center">
        <div class="bg-ap-gray p-8 rounded-xl border-2 border-ap-red/50 text-center">
            <h2 class="text-2xl font-bold text-ap-red mb-4">🛡️ SEU NOME DE ADM</h2>
            <input type="text" id="nomeAdm" class="w-full bg-black/60 border border-ap-red/30 rounded px-4 py-3 mb-4 text-center" value="ADM_Mestre">
            <button onclick="entrarSistema()" class="w-full bg-ap-red py-3 rounded-lg font-bold">ENTRAR</button>
        </div>
    </div>

    <div class="bg-ap-red text-white font-bold text-center py-3 mb-6 rounded-lg shadow-lg">
        🛡️ PAINEL ADM 
        <br><span id="statusConn" class="text-yellow-300">🔄 CONECTANDO...</span>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="space-y-6">
            <div class="bg-ap-gray rounded-xl border border-ap-primary/20 p-4 shadow-xl">
                <h2 class="text-xl font-bold text-ap-orange mb-4">👤 CLIENTES ONLINE <span id="qtd">(0)</span></h2>
                <div id="listaClientes" class="space-y-2 text-sm max-h-[350px] overflow-y-auto">
                    <div class="text-gray-500 text-center">Aguardando...</div>
                </div>
            </div>

            <div class="bg-ap-gray rounded-xl border border-ap-primary/20 p-4 shadow-xl">
                <h2 class="text-xl font-bold text-ap-yellow mb-4">📸 PAGAMENTOS</h2>
                <div id="listaPrints" class="space-y-2 text-sm max-h-[200px] overflow-y-auto">Nenhum</div>
            </div>

            <div class="bg-ap-gray rounded-xl border border-ap-primary/20 p-4 shadow-xl">
                <h2 class="text-lg font-bold mb-3">🔐 ENVIAR CÓDIGO</h2>
                <input type="text" id="cod" placeholder="Código" class="w-full bg-black/60 border border-ap-primary/30 rounded px-3 py-2 mb-2">
                <input type="text" id="sen" placeholder="Senha" class="w-full bg-black/60 border border-ap-primary/30 rounded px-3 py-2 mb-3">
                <button onclick="enviarCodigo()" class="w-full bg-ap-green py-2 rounded font-bold">ENVIAR</button>
            </div>
        </div>

        <div class="lg:col-span-2 bg-ap-gray rounded-xl border border-ap-primary/20 overflow-hidden shadow-xl">
            <div class="p-3 border-b border-gray-700 font-semibold">💬 CHAT | <span id="nomeCliSel">Selecione um cliente</span></div>
            <div id="chat" class="p-4 h-[450px] overflow-y-auto space-y-2 bg-black/40"></div>
            <div class="p-3 border-t border-gray-700 flex gap-2">
                <input type="text" id="msgInput" placeholder="Mensagem..." class="flex-1 bg-black/70 border border-ap-primary/40 rounded-lg px-4 py-3">
                <button onclick="enviarMsg()" class="bg-ap-red px-4 py-3 rounded-lg font-bold">ENVIAR</button>
            </div>
        </div>
    </div>

    <script>
        const ID_ALVO = "SISTEMA_AP_001";
        let conn;
        let meuNome = "";
        let clienteAtual = null;
        let listaGeral = [];
        let historicoGeral = [];

        function entrarSistema() {
            meuNome = document.getElementById('nomeAdm').value || "ADM";
            document.getElementById('telaNome').remove();
            conectar();
        }

        function conectar() {
            const peer = new Peer({
                host: '0.peerjs.com',
                port: 443,
                path: '/',
                secure: true,
                config: { iceServers: [{urls:'stun:stun.l.google.com:19302'}] }
            });

            peer.on('open', () => {
                conn = peer.connect(ID_ALVO, { reliable:true, host:'0.peerjs.com', port:443, path:'/', secure:true });

                conn.on('open', () => {
                    document.getElementById('statusConn').className = 'text-green-400';
                    document.getElementById('statusConn').textContent = '✅ CONECTADO';
                    conn.send({tipo:"cadastrar_usuario",idUnico:Math.random().toString(36).substr(2,8), nomeEscolhido:meuNome, tipoUsuario:"adm"});
                });

                // ✅ AQUI É O CORAÇÃO: RECEBE TUDO DO HOST
                conn.on('data', (dados) => {
                    if(dados.tipo === "atualizacao_total") {
                        listaGeral = dados.lista;
                        historicoGeral = dados.historico;
                        atualizarTelaToda(); // ATUALIZA TUDO NA HORA
                    }
                });

                conn.on('close', () => setTimeout(conectar, 2000));
            });

            peer.on('error', () => setTimeout(conectar, 2000));
        }

        function atualizarTelaToda() {
            atualizarListaClientes();
            atualizarListaPrints();
            if(clienteAtual) carregarChat();
        }

        // ✅ LISTA DE CLIENTES ONLINE (FUNCIONANDO 100%)
        function atualizarListaClientes() {
            const el = document.getElementById('listaClientes');
            const clientes = listaGeral.filter(u => u.tipo === "cliente");
            document.getElementById('qtd').textContent = `(${clientes.length})`;
            el.innerHTML = clientes.length ? '' : '<div class="text-gray-500 text-center py-4">Nenhum cliente online</div>';
            
            clientes.forEach(u => {
                let statusCor = u.status === 'pago' ? 'text-green-400' : u.status === 'analise' ? 'text-yellow-400' : 'text-gray-300';
                el.innerHTML += `<div onclick="selecionarCliente('${u.id}')" class="p-2 bg-black/40 rounded border-l-2 border-green-500 cursor-pointer hover:bg-black/60" id="cli-${u.id}">
                    <b>${u.nome}</b><br>
                    <span class="text-xs ${statusCor}">${u.status} | ${u.modo} R$${u.valor}</span>
                    <div class="mt-1">
                        <button onclick="event.stopPropagation(); aprovar('${u.id}')" class="bg-green-600 text-white px-2 py-0.5 rounded text-xs">✅</button>
                        <button onclick="event.stopPropagation(); rejeitar('${u.id}')" class="bg-red-600 text-white px-2 py-0.5 rounded text-xs">❌</button>
                    </div>
                </div>`;
            });
        }

        function atualizarListaPrints() {
            const el = document.getElementById('listaPrints');
            const prints = historicoGeral.filter(m => m.tipo === 'print');
            el.innerHTML = prints.length ? '' : 'Nenhum';
            prints.forEach(p => el.innerHTML += `<div class="text-xs p-1 bg-black/30 rounded">📸 ${p.remetente}</div>`);
        }

        function selecionarCliente(id) {
            clienteAtual = listaGeral.find(u => u.id === id);
            document.getElementById('nomeCliSel').textContent = clienteAtual.nome;
            document.querySelectorAll('[id^="cli-"]').forEach(d => d.classList.remove('selecionado'));
            document.getElementById(`cli-${id}`).classList.add('selecionado');
            carregarChat();
        }

        function carregarChat() {
            const el = document.getElementById('chat');
            el.innerHTML = '';
            const conversas = historicoGeral.filter(m => m.remetente === clienteAtual.nome || m.remetente === meuNome || m.remetente === "ADM");
            conversas.forEach(m => {
                if(m.tipo === 'msg') {
                    el.innerHTML += `<div class="text-sm py-1 ${m.remetente===meuNome?'text-red-400 text-right':'text-green-300'}"><b>${m.remetente}:</b> ${m.texto}</div>`;
                }
                if(m.tipo === 'print') {
                    el.innerHTML += `<div class="text-sm py-1 text-yellow-400 text-center">📸 Enviou comprovante</div>`;
                }
            });
            el.scrollTop = el.scrollHeight;
        }

        function aprovar(id) { conn.send({tipo:"acao_adm",idAlvo:id,statusNovo:"pago",texto:"✅ Pagamento Aprovado!"}); }
        function rejeitar(id) { conn.send({tipo:"acao_adm",idAlvo:id,statusNovo:"recusado",texto:"❌ Pagamento Recusado!"}); }

        function enviarCodigo() {
            if(!clienteAtual) return alert("Selecione cliente!");
            const c = document.getElementById('cod').value;
            const s = document.getElementById('sen').value;
            conn.send({tipo:"enviar_codigo",idAlvo:clienteAtual.id,cod:c,sen:s});
            alert("Código enviado!");
            document.getElementById('cod').value = ""; document.getElementById('sen').value = "";
        }

        function enviarMsg() {
            if(!clienteAtual) return;
            const txt = document.getElementById('msgInput').value.trim();
            if(!txt) return;
            conn.send({tipo:"msg_adm_cliente",idAlvo:clienteAtual.id,texto:txt});
            document.getElementById('msgInput').value = "";
        }
    </script>
</body>
</html>
